server:
  port: 8080
  # 与 spring.servlet.multipart 对齐；Tomcat 默认 max-http-form-post-size 较小，
  # 仅调 multipart 仍可能被连接器拒绝，导致 MaxUploadSizeExceededException
  tomcat:
    max-http-form-post-size: 500MB
    max-swallow-size: 500MB

spring:
  application:
    name: onerag

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: root
    password: root
    url: jdbc:mysql://192.168.100.128:3309/oneRagent?characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password: 1234

milvus:
  host: 192.168.100.128
  port: 19530
  username:
  password:
  collection:
    name: documents

rag:
  chat:
    query-rewrite-enabled: true
    intent-enabled: true
    retrieval-enabled: true
    max-context-chars: 4000
    max-rag-chunks: 5
    max-rag-context-chars: 3000
    retrieval-top-k: 5
    bm25-enabled: false
    cache-ttl-millis: 60000
    # 含编排（改写/意图/检索等）在首次 SSE 推送前可能数十秒～数分钟；过短会先 onTimeout 再等大模型返回
    sse-timeout-millis: 600000
    # 改写/意图 HTTP 整次调用上限（connect+read+排队首包）
    rewrite-timeout-ms: 20000
    intent-timeout-ms: 20000
    # 极短句改写收益低，且与意图并行时易占满慢一路超时；设为 8 时「我叫什么」等会跳过改写
    query-rewrite-skip-if-shorter-than-or-equal: 8

  default:
    collection-name: rag_default_store
    dimension: 4096
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /api/chat
        embedding: /api/embed
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: Pro/zai-org/GLM-5
    rewrite-intent-model: Pro/zai-org/GLM-5
    deep-thinking-model: Qwen/Qwen3.5-35B-A3B
    thinking-budget:
      chat: 1024
      stream-default: 1
      stream-deep: 2048
      rewrite: 512
      intent: 512
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: Pro/zai-org/GLM-5
        provider: siliconflow
        model: Pro/zai-org/GLM-5
        supports-thinking: true
        priority: 0
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2
#      - id: Qwen3.5-9B
#        provider: siliconflow
#        model: Qwen/Qwen3.5-9B
#        supports-thinking: true
#        priority: 0


#  embedding:
#    default-model: qwen-emb-8b
#    candidates:
#      - id: qwen-emb-8b
#        provider: siliconflow
#        model: qwen3embedding-8b
#        dimension: 4096
#        priority: 1
#      - id: qwen-emb-local
#        provider: ollama
#        model: qwen3-embedding:8b-fp16
#        dimension: 4096
#        priority: 2
  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: 4096
        priority: 1
#      - id: qwen-emb-local
#        provider: ollama
#        model: qwen3-embedding:8b-fp16
#        dimension: 4096
#        priority: 2

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://192.168.100.128:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin
  bucket: documents

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false